name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync --frozen
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync --frozen --python ${{ matrix.python-version }}
      - run: uv run pytest -q

  integration:
    # Opt-in: only runs when ANYFRAME_API_KEY is configured on the repo. Other
    # PRs and forks skip cleanly so the matrix stays green.
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync --frozen
      - name: Run integration tests (skipped if no API key)
        env:
          ANYFRAME_API_KEY: ${{ secrets.ANYFRAME_API_KEY }}
          ANYFRAME_BASE_URL: ${{ secrets.ANYFRAME_BASE_URL }}
        # pytest exits 5 when no tests are collected. That's our "skip"
        # signal — it happens when the codebase has no `@pytest.mark.integration`
        # tests yet, or when ANYFRAME_API_KEY is absent and the suite
        # self-skips at collection time. Treat exit 5 as success; anything
        # else is a real failure.
        run: |
          set +e
          uv run pytest -q -m integration
          code=$?
          [ $code -eq 0 ] || [ $code -eq 5 ]
