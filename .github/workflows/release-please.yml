name: Release PR

on:
  push:
    branches: [main]

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    if: github.repository == 'tinyhq/anyframe-python'
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.GITHUB_TOKEN }}

  # Inline publish: when release-please creates a release, GitHub suppresses
  # the `release: published` event for downstream workflows (because it was
  # fired by GITHUB_TOKEN). So we publish here directly instead of relying
  # on publish.yml's event trigger.
  publish:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    # Must match the environment name configured on the PyPI Trusted Publisher
    # (PyPI → Manage project → Publishing). Without it, OIDC publish 403s.
    environment:
      name: pypi
      url: https://pypi.org/project/anyframe/
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - run: uv sync --frozen

      - name: Tests (pre-publish gate)
        run: uv run pytest -q

      - run: uv run ruff check .
      - run: uv run ruff format --check .

      - run: uv build
      - run: uv publish
